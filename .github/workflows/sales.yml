name: NullThread sales feed

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). Scheduled runs can be delayed a few
    # minutes under load — fine for a sales feed. Widen to '*/15 * * * *' etc.
    - cron: '*/20 * * * *'
  workflow_dispatch: {}        # adds a "Run workflow" button for manual/test runs

# Needed so the job can commit the updated watermark (state.json) back to the repo.
permissions:
  contents: write

concurrency:
  group: nullthread-sales-feed
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Poll OpenSea and post new sales
        env:
          OPENSEA_API_KEY: ${{ secrets.OPENSEA_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node poll.js

      - name: Persist watermark
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "nullthread-sales-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update sales watermark [skip ci]"
            git pull --rebase --autostash || true
            git push
          else
            echo "No new sales; state unchanged."
          fi
